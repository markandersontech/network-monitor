[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "5s"
  flush_interval = "30s"
  flush_jitter = "5s"

###############################################################################
# OUTPUT: InfluxDB v2
###############################################################################

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_BUCKET"

###############################################################################
# INPUT: SNMP (Single Device)
###############################################################################

[[inputs.snmp]]
  agents = ["udp://192.168.4.54:161"]

  version = 2
  community = "Kobenhavn"
  timeout = "5s"
  retries = 2

  name = "snmp"

  ###########################################################################
  # TAGS
  ###########################################################################

  [[inputs.snmp.tags]]
    oid = "1.3.6.1.2.1.1.5.0"   # sysName
    name = "hostname"

  ###########################################################################
  # BASIC SYSTEM METRICS
  ###########################################################################

  [[inputs.snmp.field]]
    name = "uptime"
    oid = "1.3.6.1.2.1.1.3.0"

###############################################################################
# INTERFACE METRICS (64-bit)
###############################################################################

[[inputs.snmp.table]]
  name = "interface"
  inherit_tags = ["hostname"]

  [[inputs.snmp.table.field]]
    name = "ifName"
    oid = "1.3.6.1.2.1.31.1.1.1.1"
    is_tag = true

  [[inputs.snmp.table.field]]
    name = "ifAlias"
    oid = "1.3.6.1.2.1.31.1.1.1.18"
    is_tag = true

  [[inputs.snmp.table.field]]
    name = "ifHCInOctets"
    oid = "1.3.6.1.2.1.31.1.1.1.6"

  [[inputs.snmp.table.field]]
    name = "ifHCOutOctets"
    oid = "1.3.6.1.2.1.31.1.1.1.10"

  [[inputs.snmp.table.field]]
    name = "ifHighSpeed"
    oid = "1.3.6.1.2.1.31.1.1.1.15"

  [[inputs.snmp.table.field]]
    name = "ifOperStatus"
    oid = "1.3.6.1.2.1.2.2.1.8"

###############################################################################
# LINUX SYSTEM METRICS (UCD-SNMP)
###############################################################################

[[inputs.snmp]]
  agents = ["udp://192.168.4.54:161"]

  version = 2
  community = "Kobenhavn"
  name = "linux_system"

  [[inputs.snmp.tags]]
    oid = "1.3.6.1.2.1.1.5.0"
    name = "hostname"

  # CPU Load
  [[inputs.snmp.field]]
    name = "load1"
    oid = "1.3.6.1.4.1.2021.10.1.3.1"

  [[inputs.snmp.field]]
    name = "load5"
    oid = "1.3.6.1.4.1.2021.10.1.3.2"

  [[inputs.snmp.field]]
    name = "load15"
    oid = "1.3.6.1.4.1.2021.10.1.3.3"

  # Memory
  [[inputs.snmp.field]]
    name = "memTotal"
    oid = "1.3.6.1.4.1.2021.4.5.0"

  [[inputs.snmp.field]]
    name = "memAvail"
    oid = "1.3.6.1.4.1.2021.4.6.0"

  [[inputs.snmp.field]]
    name = "memCache"
    oid = "1.3.6.1.4.1.2021.4.14.0"

###############################################################################
# LINUX DISK METRICS (UCD-SNMP)
###############################################################################

[[inputs.snmp.table]]
  name = "disk"
  inherit_tags = ["hostname"]

  [[inputs.snmp.table.field]]
    name = "diskPath"
    oid = "1.3.6.1.4.1.2021.9.1.2"
    is_tag = true

  [[inputs.snmp.table.field]]
    name = "diskDevice"
    oid = "1.3.6.1.4.1.2021.9.1.3"
    is_tag = true

  [[inputs.snmp.table.field]]
    name = "diskTotal"
    oid = "1.3.6.1.4.1.2021.9.1.6"

  [[inputs.snmp.table.field]]
    name = "diskAvail"
    oid = "1.3.6.1.4.1.2021.9.1.7"

  [[inputs.snmp.table.field]]
    name = "diskUsedPercent"
    oid = "1.3.6.1.4.1.2021.9.1.9"
