[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "5s"
  flush_interval = "30s"
  flush_jitter = "5s"
  precision = ""
  hostname = ""
  omit_hostname = false

###############################################################################
# OUTPUT: InfluxDB
###############################################################################

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "network"
  username = "$INFLUXDB_USER"
  password = "$INFLUXDB_PASSWORD"

###############################################################################
# INPUT: SNMP
###############################################################################

[[inputs.snmp]]
  agents = [
    "udp://10.80.22.1:161",  # kort1 (Router)
    "udp://10.80.22.4:161",  # kosw21 (Switch)
    "udp://10.80.22.5:161",  # kosw22 (Switch)
    "udp://10.80.22.6:161",  # kosw23 (Switch)
    "udp://10.80.22.11:161"  # kosv41 (Server)
  ]

  version = 2
  community = "Kobenhavn"
  timeout = "5s"
  retries = 2

  name = "snmp"

  ###########################################################################
  # TAGS (Device Identification)
  ###########################################################################

  [[inputs.snmp.tag]]
    oid = "1.3.6.1.2.1.1.5.0"   # sysName
    name = "hostname"

  ###########################################################################
  # SYSTEM METRICS
  ###########################################################################

  [[inputs.snmp.field]]
    name = "uptime"
    oid = "1.3.6.1.2.1.1.3.0"

  ###########################################################################
  # INTERFACE TABLE (MOST IMPORTANT)
  ###########################################################################

[[inputs.snmp.table]]
  name = "interface"
  inherit_tags = ["hostname"]

  [[inputs.snmp.table.field]]
    name = "ifDescr"
    oid = "1.3.6.1.2.1.2.2.1.2"
    is_tag = true

  [[inputs.snmp.table.field]]
    name = "ifName"
    oid = "1.3.6.1.2.1.31.1.1.1.1"
    is_tag = true

  [[inputs.snmp.table.field]]
    name = "ifAlias"
    oid = "1.3.6.1.2.1.31.1.1.1.18"
    is_tag = true

  ###########################################################################
  # 64-bit Counters (HIGH CAPACITY)
  ###########################################################################

  [[inputs.snmp.table.field]]
    name = "ifHCInOctets"
    oid = "1.3.6.1.2.1.31.1.1.1.6"

  [[inputs.snmp.table.field]]
    name = "ifHCOutOctets"
    oid = "1.3.6.1.2.1.31.1.1.1.10"

  ###########################################################################
  # Interface Speed & Status
  ###########################################################################

  [[inputs.snmp.table.field]]
    name = "ifSpeed"
    oid = "1.3.6.1.2.1.2.2.1.5"

  [[inputs.snmp.table.field]]
    name = "ifHighSpeed"
    oid = "1.3.6.1.2.1.31.1.1.1.15"

  [[inputs.snmp.table.field]]
    name = "ifOperStatus"
    oid = "1.3.6.1.2.1.2.2.1.8"
